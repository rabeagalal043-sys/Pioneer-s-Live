<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Pioneer's Live Streaming — قاعة البث</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="loading-veil" id="loadingVeil">
    <div class="spinner"></div>
    <p>جاري الاتصال بالإرسال…</p>
  </div>

  <div class="stage">
    <header class="topbar">
      <div class="brand">
        <span class="rec-dot" aria-hidden="true"></span>
        Pioneer's <span>Live</span>
      </div>

      <div class="session-chip" id="sessionChip">
        <span class="mono" id="sessionTitleText">المحاضرة المباشرة</span>
      </div>

      <div class="viewer-info">
        <span class="viewer-name">مرحبًا، <b id="viewerName">—</b></span>
        <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
      </div>
    </header>

    <div class="player-zone">
      <div class="player-frame" id="playerFrame">
        <div id="ytHost"></div>
        <div class="shield" id="shield"></div>

        <div class="poster-overlay" id="posterOverlay">
          <button class="big-play" id="bigPlayBtn" aria-label="تشغيل">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
        </div>

        <button class="unmute-badge" id="unmuteBadge" style="display:none">
          <svg viewBox="0 0 24 24"><path d="M16.5 12A4.5 4.5 0 0 0 14 8v2.18l2.45 2.45c.03-.2.05-.41.05-.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-3-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/></svg>
          اضغط لتشغيل الصوت
        </button>
      </div>
    </div>

    <div class="console-bar">
      <div class="console-inner">
        <button class="ctrl-btn" id="playPauseBtn" aria-label="تشغيل / إيقاف">
          <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>

        <button class="ctrl-btn" id="muteBtn" aria-label="تشغيل / كتم الصوت">
          <svg id="iconMuted" viewBox="0 0 24 24"><path d="M16.5 12A4.5 4.5 0 0 0 14 8v2.18l2.45 2.45c.03-.2.05-.41.05-.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-3-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/></svg>
          <svg id="iconUnmuted" viewBox="0 0 24 24" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8v8a4.5 4.5 0 0 0 2.5-4zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4-.91 7-4.49 7-8.77s-3-7.86-7-8.77z"/></svg>
        </button>

        <div class="live-badge">
          <span class="rec-dot" style="width:7px;height:7px" aria-hidden="true"></span>
          LIVE
        </div>

        <span class="time-readout mono" id="timeReadout">00:00</span>

        <div class="seek-track" aria-hidden="true">
          <div class="seek-fill" id="seekFill"></div>
        </div>



        <div class="quality-wrap">
          <button class="quality-btn" id="qualityBtn">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7zm7.4-2.5a7.7 7.7 0 0 0 0-2l2-1.6-2-3.4-2.4 1a7.6 7.6 0 0 0-1.7-1L15 3h-4l-.3 2.9a7.6 7.6 0 0 0-1.7 1l-2.4-1-2 3.4L6.6 11a7.7 7.7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7.6 7.6 0 0 0 1.7 1L11 21h4l.3-2.9a7.6 7.6 0 0 0 1.7-1l2.4 1 2-3.4z"/></svg>
            <span id="qualityLabel">جودة تلقائية</span>
          </button>
          <div class="quality-menu" id="qualityMenu"></div>
        </div>

        <button class="ctrl-btn" id="fullscreenBtn" aria-label="ملء الشاشة">
          <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/player.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
